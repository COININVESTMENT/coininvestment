<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="admin-page">

<header class="perfil-header">
  <div class="perfil-contenedor">
    <h2>Panel de Administración</h2>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
  </div>
</header>

<main class="perfil-main">

<section class="card">
  <h3>Depósitos Pendientes</h3>

  <table class="tabla-admin">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Monto</th>
        <th>TXID</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaDepositos">
      <tr>
        <td colspan="5">Cargando depósitos...</td>
      </tr>
    </tbody>
  </table>
</section>

<section class="card">
  <h3>Retiros Pendientes</h3>

  <table class="tabla-admin">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Wallet</th>
        <th>Monto</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaRetiros">
      <tr>
        <td colspan="4">Cargando retiros...</td>
      </tr>
    </tbody>
  </table>
</section>

</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtToXsyI1gbBn7JytIq1vy8vBR1UgReEQ",
  authDomain: "coin-investment-15e18.firebaseapp.com",
  projectId: "coin-investment-15e18",
  storageBucket: "coin-investment-15e18.firebasestorage.app",
  messagingSenderId: "145147689452",
  appId: "1:145147689452:web:569ab6c1b1e1045659a8c9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const tabla = document.getElementById("tablaDepositos");
const tablaRetiros = document.getElementById("tablaRetiros");

/* ========= VALIDAR SESIÓN ========= */
const usuarioLogueado = localStorage.getItem("usuarioLogueado");
if (!usuarioLogueado) {
  window.location.href = "index.html";
}


/* ========= VALIDAR ADMIN ========= */
db.collection("usuarios")
  .where("usuario", "==", usuarioLogueado)
  .get()
  .then(snapshot => {
    if (snapshot.empty) {
      window.location.href = "index.html";
      return;
    }

    const user = snapshot.docs[0].data();
    if (user.rol !== "admin") {
      alert("Acceso denegado");
      window.location.href = "perfil.html";
      return;
    }

    escucharDepositos();
    escucharRetiros();
  });

/* ========= DEPÓSITOS ========= */
function escucharDepositos() {
  db.collection("depositos")
    .where("estado", "==", "pendiente")
    .orderBy("fecha", "desc")
    .onSnapshot(snapshot => {

      tabla.innerHTML = "";

      if (snapshot.empty) {
        tabla.innerHTML = `
          <tr>
            <td colspan="5">No hay depósitos pendientes</td>
          </tr>`;
        return;
      }

      snapshot.forEach(doc => {
        const d = doc.data();
        const fecha = d.fecha
          ? d.fecha.toDate().toLocaleString()
          : "—";

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${d.usuario}</td>
          <td>$${d.monto}</td>
          <td>${d.txid}</td>
          <td>${fecha}</td>
          <td>
            <button onclick="aprobarDeposito('${doc.id}')">Aprobar</button>
            <button class="cancelar" onclick="rechazarDeposito('${doc.id}')">Rechazar</button>
          </td>
        `;

        tabla.appendChild(tr);
      });
    });
}
/* ========= RETIROS ========= */
function escucharRetiros() {
  db.collection("retiros")
    .where("estado", "==", "pendiente")
    .orderBy("fecha", "desc")
    .onSnapshot(snapshot => {

      tablaRetiros.innerHTML = "";

      if (snapshot.empty) {
        tablaRetiros.innerHTML = `
          <tr>
            <td colspan="4">No hay retiros pendientes</td>
          </tr>`;
        return;
      }

      snapshot.forEach(doc => {
        const d = doc.data();
        const fecha = d.fecha
          ? d.fecha.toDate().toLocaleString()
          : "—";

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${d.usuario}</td>
          <td>${d.wallet || "—"}</td>
          <td>$${d.monto}</td>
          <td>${fecha}</td>
          <td>
            <button onclick="aprobarRetiro('${doc.id}')">Aprobar</button>
            <button class="cancelar" onclick="rechazarRetiro('${doc.id}')">Rechazar</button>
          </td>
        `;

        tablaRetiros.appendChild(tr);
      });
    });
}

/* ========= APROBAR ========= */
function aprobarDeposito(id) {
  if (!confirm("¿Aprobar este depósito?")) return;

  db.collection("depositos")
    .doc(id)
    .update({ estado: "aprobado" })
    .then(() => {
      alert("Depósito aprobado");
    });
}

/* ========= RECHAZAR ========= */
function rechazarDeposito(id) {
  if (!confirm("¿Rechazar este depósito?")) return;

  db.collection("depositos")
    .doc(id)
    .update({ estado: "rechazado" })
    .then(() => alert("Depósito rechazado"));
}
function aprobarRetiro(id) {
  if (!confirm("¿Aprobar este retiro?")) return;

  db.collection("retiros")
    .doc(id)
    .update({ estado: "aprobado" })
    .then(() => {
      alert("Retiro aprobado");
    });
}

function rechazarRetiro(id) {
  if (!confirm("¿Rechazar este retiro?")) return;

  db.collection("retiros")
    .doc(id)
    .update({ estado: "rechazado" })
    .then(() => {
      alert("Retiro rechazado");
    });
}

function cerrarSesion() {
  localStorage.removeItem("sesionActiva");
  localStorage.removeItem("usuarioLogueado");
  window.location.href = "index.html";
}
</script>
<script>
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});
</script>
</body>
</html>
